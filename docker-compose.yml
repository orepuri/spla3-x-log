name: spla3-x-log

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      PORT: ${APP_PORT:-5173}
      HOST: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER:-spla}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-spla}
    ports:
      - "127.0.0.1:${APP_PORT:-5173}:${APP_PORT:-5173}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 5173) + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      POSTGRES_DB: ${POSTGRES_DB:-spla}
      POSTGRES_USER: ${POSTGRES_USER:-spla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spla} -d ${POSTGRES_DB:-spla}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    profiles:
      - backup
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      BACKUP_SCHEDULE: "${BACKUP_SCHEDULE:-0 6 * * *}"
      BACKUP_NAME_PREFIX: ${BACKUP_NAME_PREFIX:-spla3-x-log}
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-spla}
      PGUSER: ${POSTGRES_USER:-spla}
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PREFIX: ${R2_PREFIX:-backups}
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      RCLONE_CONFIG_R2_REGION: auto
      RCLONE_CONFIG_R2_ENDPOINT: ${R2_ENDPOINT:-}
      RCLONE_CONFIG_R2_ACL: private
      RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
