name: spla3-x-log

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      PORT: ${APP_PORT:-5173}
      HOST: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER:-spla}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-spla}
    ports:
      - "127.0.0.1:${APP_PORT:-5173}:${APP_PORT:-5173}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 5173) + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spla}
      POSTGRES_USER: ${POSTGRES_USER:-spla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spla} -d ${POSTGRES_DB:-spla}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
