name: spla3-x-log

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      PORT: ${APP_PORT:-5173}
      HOST: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER:-spla}:${POSTGRES_PASSWORD:-spla_password}@db:5432/${POSTGRES_DB:-spla}
    ports:
      - "${APP_PORT:-5173}:${APP_PORT:-5173}"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spla}
      POSTGRES_USER: ${POSTGRES_USER:-spla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spla_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spla} -d ${POSTGRES_DB:-spla}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
    name: spla_postgres-data
    external: true
